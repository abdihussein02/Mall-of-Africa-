<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mall of Africa Restaurant – Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0B;
  --surface:#161613;
  --card:#1C1C19;
  --gold:#C9A96E;
  --gold2:#E8C98A;
  --text:#F2EDE4;
  --muted:#8A8479;
  --border:rgba(201,169,110,0.15);
  --red:#C0441A;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* HERO */
.hero{position:relative;text-align:center;padding:3.5rem 1rem 2.5rem;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,169,110,0.09) 0%, transparent 70%);pointer-events:none}
.hero-tag{display:inline-block;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);border:0.5px solid var(--border);padding:4px 16px;border-radius:20px;margin-bottom:1rem}
.hero h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:600;line-height:1.1;color:var(--text)}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:14px;color:var(--muted);margin-top:10px;letter-spacing:0.05em}
.hero-info{display:flex;justify-content:center;gap:2rem;margin-top:1.4rem;flex-wrap:wrap}
.hero-info a,.hero-info span{font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s}
.hero-info a:hover{color:var(--gold)}
.hero-info svg{width:13px;height:13px;opacity:.6;flex-shrink:0}
.divider-line{display:flex;align-items:center;gap:12px;margin:2rem auto 0;max-width:300px}
.divider-line::before,.divider-line::after{content:'';flex:1;height:0.5px;background:var(--border)}
.divider-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;flex-shrink:0}

/* STICKY NAV */
.nav-wrap{position:sticky;top:0;z-index:100;background:rgba(13,13,11,0.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:0.85rem 1rem;border-bottom:0.5px solid var(--border)}
.nav-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px;max-width:760px;margin:0 auto}
.nav-scroll::-webkit-scrollbar{display:none}
.nb{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:7px 15px;border-radius:20px;border:0.5px solid rgba(201,169,110,0.2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.nb:hover{color:var(--gold);border-color:rgba(201,169,110,0.4)}
.nb.active{background:var(--gold);color:#0D0D0B;border-color:var(--gold);font-weight:500}

/* CONTENT */
.content{padding:1.5rem 1rem 4rem;max-width:760px;margin:0 auto}

/* SECTION HEADER */
.sec-head{display:flex;align-items:baseline;gap:12px;margin:2.5rem 0 0.5rem}
.sec-head:first-child{margin-top:0.5rem}
.sec-head h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;color:var(--text)}
.sec-count{font-size:11px;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase}
.sec-note{font-size:12px;color:var(--muted);margin-bottom:1.1rem;font-style:italic}

/* PHOTO GRID */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:0.5rem}
.photo-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;transition:transform 0.25s,border-color 0.25s}
.photo-card:hover{transform:translateY(-4px);border-color:rgba(201,169,110,0.4)}
.photo-card img{width:100%;height:140px;object-fit:cover;display:block;filter:brightness(0.88);transition:filter 0.25s}
.photo-card:hover img{filter:brightness(1)}
.no-img{width:100%;height:90px;background:linear-gradient(135deg,#1C1C19,#252520);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--muted)}
.pc-body{padding:11px 13px 13px}
.pc-top{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:5px}
.pc-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.pc-price{font-size:15px;font-weight:500;color:var(--gold);white-space:nowrap}
.pc-desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:7px}
.pc-badge{display:inline-block;font-size:9px;letter-spacing:0.09em;text-transform:uppercase;background:rgba(201,169,110,0.1);color:var(--gold);padding:2px 9px;border-radius:20px;border:0.5px solid rgba(201,169,110,0.25)}

/* LIST GRID */
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;margin-bottom:0.5rem}
.list-card{background:var(--card);border:0.5px solid var(--border);border-radius:11px;padding:12px 14px;transition:border-color 0.2s}
.list-card:hover{border-color:rgba(201,169,110,0.3)}
.lc-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.lc-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.lc-price{font-size:13px;color:var(--gold);white-space:nowrap;font-weight:500}
.lc-desc{font-size:11px;color:var(--muted);line-height:1.55}
.lc-badge{display:inline-block;margin-top:6px;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;background:rgba(192,68,26,0.12);color:#E07050;padding:2px 8px;border-radius:20px;border:0.5px solid rgba(192,68,26,0.2)}

/* SPECIALS */
.special-card{background:linear-gradient(135deg,rgba(201,169,110,0.08),rgba(201,169,110,0.02));border:0.5px solid rgba(201,169,110,0.3);border-radius:14px;padding:16px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:start;gap:16px;transition:border-color 0.2s}
.special-card:hover{border-color:rgba(201,169,110,0.5)}
.sc-left{flex:1}
.sc-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);margin-bottom:5px;line-height:1.3}
.sc-desc{font-size:12px;color:var(--muted);line-height:1.6}
.sc-right{text-align:right;flex-shrink:0}
.sc-price{font-size:18px;font-weight:500;color:var(--gold);white-space:nowrap}
.sc-tag{display:inline-block;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;background:var(--gold);color:#0D0D0B;padding:2px 9px;border-radius:20px;margin-bottom:8px;font-weight:500}

/* FOOTER */
.menu-footer{text-align:center;padding:2.5rem 1rem 3rem;border-top:0.5px solid var(--border);margin-top:1rem}
.menu-footer .basbaas{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold);font-size:15px;margin-bottom:8px}
.menu-footer p{font-size:12px;color:var(--muted);line-height:2}
.menu-footer a{color:var(--muted);text-decoration:none;transition:color 0.2s}
.menu-footer a:hover{color:var(--gold)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.sec-block{animation:fadeUp 0.4s ease both}

/* RESPONSIVE */
@media(max-width:480px){
  .hero h1{font-size:30px}
  .photo-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .list-grid{grid-template-columns:1fr}
  .special-card{flex-direction:column;gap:8px}
  .sc-right{text-align:left}
}
</style>
</head>
<body>

    {name:'Lamb Pasta',price:'$20.00',desc:'Slow-cooked lamb shank in rich spices, served over spiced pasta.',badge:''},

    {name:'Kati Kati with Chicken Suqaar',price:'$15.00',desc:'Kati kati served alongside fragrant, spiced chicken suqaar.',tag:'House Special'},

function buildPhotoCard(item){
  return `<div class="photo-card">
    ${item.img
      ? `<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.parentElement.querySelector('.no-img-fallback').style.display='flex';this.style.display='none'"><div class="no-img no-img-fallback" style="display:none">🍽</div>`
      : `<div class="no-img">🍽</div>`}
    <div class="pc-body">
      <div class="pc-top"><span class="pc-name">${item.name}</span><span class="pc-price">${item.price}</span></div>
      <div class="pc-desc">${item.desc}</div>
      ${item.badge ? `<span class="pc-badge">${item.badge}</span>` : ''}
    </div>
  </div>`;
}

function buildListCard(item){
  return `<div class="list-card">
    <div class="lc-top"><span class="lc-name">${item.name}</span><span class="lc-price">${item.price}</span></div>
    <div class="lc-desc">${item.desc}</div>
    ${item.badge ? `<span class="lc-badge">${item.badge}</span>` : ''}
  </div>`;
}

function buildSpecial(item){
  return `<div class="special-card">
    <div class="sc-left">
      <span class="sc-tag">${item.tag}</span>
      <div class="sc-name">${item.name}</div>
      <div class="sc-desc">${item.desc}</div>
    </div>
    <div class="sc-right"><div class="sc-price">${item.price}</div></div>
  </div>`;
}

function show(id, btn){
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('content');
  el.innerHTML = '';
  const secs = id === 'all' ? data : data.filter(s => s.id === id);
  secs.forEach((sec, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'sec-block';
    wrap.style.animationDelay = (i * 0.06) + 's';
    let html = `<div class="sec-head"><h2>${sec.label}</h2><span class="sec-count">${sec.items.length} items</span></div>`;
    if(sec.note) html += `<p class="sec-note">${sec.note}</p>`;
    if(sec.type === 'special'){
      html += sec.items.map(buildSpecial).join('');
    } else if(sec.type === 'photo'){
      html += `<div class="photo-grid">${sec.items.map(buildPhotoCard).join('')}</div>`;
    } else {
      html += `<div class="list-grid">${sec.items.map(buildListCard).join('')}</div>`;
    }
    wrap.innerHTML = html;
    el.appendChild(wrap);
  });
}

show('all', document.querySelector('.nb.active'));
</script>

</html>
